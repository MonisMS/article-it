name: RSS Ingest

on:
  schedule:
    - cron: "0 6 * * *" # once daily at 06:00 UTC
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ingest
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "APP_URL secret not set — skipping."
            exit 0
          fi
          BODY_FILE="$(mktemp)"
          STATUS=$(curl -sSL -o "$BODY_FILE" -w "%{http_code}" \
            -X GET "$APP_URL/api/cron/ingest" \
            -H "Authorization: Bearer $CRON_SECRET")
          echo "Response status: $STATUS"
          if [ "${STATUS:0:1}" != "2" ]; then
            echo "Ingest failed. Response body:"
            cat "$BODY_FILE" || true
            exit 1
          fi
