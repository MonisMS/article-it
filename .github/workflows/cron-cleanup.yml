name: Article Cleanup

on:
  schedule:
    - cron: "0 3 * * 0" # Sunday 03:00 UTC — weekly, off-peak
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete articles older than 90 days (unbookmarked)
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "APP_URL secret not set — skipping."
            exit 0
          fi
          STATUS=$(curl -sSL -o /dev/null -w "%{http_code}" \
            -X GET "$APP_URL/api/cron/cleanup" \
            -H "Authorization: Bearer $CRON_SECRET")
          echo "Response status: $STATUS"
          if [ "${STATUS:0:1}" != "2" ]; then
            echo "Cleanup failed with status $STATUS"
            exit 1
          fi
