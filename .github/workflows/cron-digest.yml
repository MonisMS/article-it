name: Email Digests

on:
  schedule:
    - cron: "0 6-22 * * *" # every hour, 06:00–22:00 UTC (covers all realistic digest times)
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger digest
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "APP_URL secret not set — skipping."
            exit 0
          fi

          BODY_FILE="$(mktemp)"
          STATUS=$(curl -sSL -o "$BODY_FILE" -w "%{http_code}" \
            -X GET "$APP_URL/api/cron/digest" \
            -H "Authorization: Bearer $CRON_SECRET")
          echo "Response status: $STATUS"
          if [ "${STATUS:0:1}" != "2" ]; then
            echo "Digest failed. Response body:"
            cat "$BODY_FILE" || true
            exit 1
          fi
