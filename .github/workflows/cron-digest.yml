name: Email Digests

on:
  schedule:
    - cron: "0 * * * *" # every hour
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Skip if not deployed yet
        if: ${{ secrets.APP_URL == '' }}
        run: |
          echo "APP_URL secret not set — app not deployed yet, skipping."
          exit 0

      - name: Trigger digest
        if: ${{ secrets.APP_URL != '' }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.APP_URL }}/api/cron/digest" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "Response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Digest failed with status $STATUS"
            exit 1
          fi
